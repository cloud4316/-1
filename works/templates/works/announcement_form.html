{% extends 'works/base.html' %}
{% block title %}Новое объявление{% endblock %}
{% block content %}
<div style="max-width:620px;margin:2rem auto;padding:0 1rem">
  <h2 style="margin-bottom:1.25rem"><i class="fas fa-bullhorn"></i> Новое объявление</h2>
  <form method="post" action="{% url 'create_announcement' %}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{% url 'home' %}">

    <div class="form-group">
      <label class="form-label">Заголовок *</label>
      <input name="title" class="form-input" required maxlength="200" placeholder="Контрольная работа перенесена…">
    </div>

    <div class="form-group">
      <label class="form-label">Текст (необязательно)</label>
      <textarea name="body" class="form-input" rows="4" placeholder="Подробности…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Предмет (пусто = для всех)</label>
      <select name="subject_id" class="form-input">
        <option value="">— Все предметы —</option>
        {% for s in subjects %}
        <option value="{{ s.id }}">{{ s.title }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Скрыть с даты (необязательно)</label>
      <input type="datetime-local" name="expires_at" class="form-input">
    </div>

    <div style="display:flex;gap:.75rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Опубликовать</button>
      <a href="{% url 'home' %}" class="btn" style="background:#f3f4f6;color:#374151">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
