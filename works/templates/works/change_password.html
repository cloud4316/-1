{% extends 'works/base.html' %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><i class="fas fa-lock"></i><span>Смена пароля</span></div>
    <h1>Изменить пароль</h1>

    {% if success %}
    <div class="alert alert-success">
      <i class="fas fa-check-circle"></i> Пароль успешно изменён!
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fas fa-key"></i> Текущий пароль</label>
        <div class="pass-wrap">
          <input type="password" name="old_password" id="pw0" placeholder="Введите текущий пароль" class="form-input">
          <button type="button" class="eye-btn" onclick="togglePass('pw0',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Новый пароль</label>
        <div class="pass-wrap">
          <input type="password" name="new_password1" id="pw1" placeholder="Минимум 6 символов" class="form-input">
          <button type="button" class="eye-btn" onclick="togglePass('pw1',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Повторите новый пароль</label>
        <div class="pass-wrap">
          <input type="password" name="new_password2" id="pw2" placeholder="Повторите пароль" class="form-input" oninput="checkMatch()">
          <button type="button" class="eye-btn" onclick="togglePass('pw2',this)"><i class="fas fa-eye"></i></button>
        </div>
        <span class="match-hint" id="matchHint"></span>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Сохранить пароль</button>
    </form>

    <p class="auth-footer"><a href="{% url 'profile' %}"><i class="fas fa-arrow-left"></i> Вернуться в профиль</a></p>
  </div>
</div>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
}
function checkMatch() {
  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;
  const hint = document.getElementById('matchHint');
  if (!p2) { hint.textContent = ''; return; }
  hint.textContent = p1 === p2 ? '✓ Пароли совпадают' : '✗ Пароли не совпадают';
  hint.style.color = p1 === p2 ? '#059669' : '#dc2626';
}
</script>
<style>
.auth-page{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{background:#fff;border-radius:16px;box-shadow:0 4px 30px rgba(0,0,0,.1);padding:2.5rem;width:100%;max-width:440px}
.auth-logo{display:flex;align-items:center;gap:.5rem;font-size:1.1rem;font-weight:700;color:#667eea;margin-bottom:.75rem}
.auth-logo i{font-size:1.4rem}
.auth-card h1{font-size:1.4rem;margin-bottom:1.5rem}
.form-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
.form-group label{font-size:.85rem;font-weight:500;color:#374151;display:flex;align-items:center;gap:.4rem}
.form-input{padding:.65rem .9rem;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.95rem;width:100%;box-sizing:border-box}
.form-input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.pass-wrap{position:relative}
.pass-wrap .form-input{padding-right:2.5rem}
.eye-btn{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer}
.match-hint{font-size:.8rem;min-height:1rem}
.btn-submit{width:100%;padding:.75rem;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.5rem}
.btn-submit:hover{background:#5a67d8}
.alert{border-radius:10px;padding:.75rem 1rem;margin-bottom:1.25rem;font-size:.88rem;display:flex;align-items:center;gap:.5rem}
.alert-success{background:#d1fae5;color:#065f46}
.alert-error{background:#fee2e2;color:#991b1b}
.auth-footer{text-align:center;margin-top:1.25rem;font-size:.9rem}
.auth-footer a{color:#667eea;text-decoration:none}
</style>
{% endblock %}
